<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRON TRIBE — Forge Your Legacy</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Performance -->
  <link rel="preload" as="image" href="images/hero.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="#hero" class="nav-logo">
      <div class="logo-img-wrap">
        <img src="images/logo.png"
             class="logo-img"
             alt="Iron Tribe Logo"
             width="120" height="40"
             loading="lazy"
             decoding="async"
             fetchpriority="low"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="logo-placeholder" style="display:none">⚡</div>
      </div>
      <div class="logo-text"><span>IRON</span><span>TRIBE</span></div>
    </a>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-bg">
    <img src="images/hero.jpg"
         class="hero-bg-img"
         alt="Gym Background"
         width="1920" height="1080"
         loading="eager"
         decoding="async"
         fetchpriority="high">
  </div>

  <div class="hero-content">
    <h1>FORGE YOUR LEGACY</h1>
  </div>
</section>

<!-- ABOUT -->
<section class="about">
  <img src="images/gym1.jpg"
       alt="Gym interior"
       width="800" height="500"
       loading="lazy"
       decoding="async"
       fetchpriority="low">
</section>

<!-- FACILITIES -->
<section class="facilities">
  <img src="images/gym2.jpg" alt="Equipment" width="400" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gym3.jpg" alt="Washroom" width="400" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gym4.jpg" alt="Workout area" width="400" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gym5.jpg" alt="Coaching" width="400" height="300" loading="lazy" decoding="async" fetchpriority="low">
</section>

<!-- GALLERY -->
<section class="gallery">
  <img src="images/gallery1.jpg" alt="Gallery 1" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery2.jpg" alt="Gallery 2" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery3.jpg" alt="Gallery 3" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery4.jpg" alt="Gallery 4" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery5.jpg" alt="Gallery 5" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery6.jpg" alt="Gallery 6" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">

  <!-- duplicate -->
  <img src="images/gallery1.jpg" alt="Gallery 1" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery2.jpg" alt="Gallery 2" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery3.jpg" alt="Gallery 3" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery4.jpg" alt="Gallery 4" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery5.jpg" alt="Gallery 5" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
  <img src="images/gallery6.jpg" alt="Gallery 6" width="300" height="300" loading="lazy" decoding="async" fetchpriority="low">
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>Join Now</h2>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2024 Iron Tribe</p>
</footer>

<script src="script.js"></script>
</body>
</html>
